version: 2

sources:
  - name: btc
    database: crypto
    schema: btc
    config:
      freshness:
        warn_after: {count: 1, period: day}
      loaded_at_field: block_timestamp
    tables:
      - name: transactions
  
  - name: eth 
    database: crypto
    schema: eth
    config:
      freshness:
        warn_after: {count: 1, period: day}
      loaded_at_field: block_timestamp
    tables:
      - name: transactions_raw