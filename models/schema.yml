version: 2

models:
  - name: stg_btc
    columns:
      - name: HASH_KEY
        tests:
          - not_null
          - unique

  - name: whale_alert
    config:
      contract:
        enforced: true
    columns:

      - name: output_address
        data_type: string
        data_tests:
          - assert_valid_btc_address

      - name: total_sent
        data_type: float

      - name: transaction_count
        data_type: int

      - name: current_value_usd
        data_type: float
